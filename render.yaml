# Render Blueprint — repo root must be this folder (contains Dockerfile + backend/).
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: qna-pdf-assistant
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    branch: main
    healthCheckPath: /api/health
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: GROQ_API_KEY
        sync: false
      - key: DATABASE_URL
        value: sqlite:////app/data/qna.db
    disk:
      name: qna-data
      mountPath: /app/data
      sizeGB: 1
